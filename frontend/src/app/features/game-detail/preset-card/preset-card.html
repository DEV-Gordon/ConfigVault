<article class="rounded-sm border border-[rgba(42,71,94,0.35)] bg-black/20 p-4">
	<div class="flex items-start justify-between gap-3">
		<h3 class="text-[15px] text-white font-medium">{{ preset.tier_label }} Preset</h3>
		<span
			class="rounded-sm border px-2 py-1 text-[11px] uppercase tracking-[0.08em]"
			[ngClass]="getDeckBadgeClass(preset.deck_verification)"
		>
			{{ preset.deck_verification }}
		</span>
	</div>

	<p class="mt-3 text-[13px] text-[#c8d4df] leading-6" *ngIf="preset.notes; else noNotes">
		{{ preset.notes }}
	</p>
	<ng-template #noNotes>
		<p class="mt-3 text-[13px] text-steam-muted">No notes for this preset.</p>
	</ng-template>

	<div class="mt-4 border-t border-[rgba(255,255,255,0.08)] pt-3">
		<h4 class="text-[11px] uppercase tracking-[0.12em] text-[#66c0f4]">Settings</h4>
		<ul class="mt-2 space-y-2" *ngIf="preset.settings.length; else noSettings">
			<li class="text-[12px] text-[#cfd9e2]" *ngFor="let setting of preset.settings">
				<span class="text-white">{{ setting.key }}:</span>
				{{ setting.value }}
				<span class="text-steam-muted">({{ setting.impact }})</span>
			</li>
		</ul>
		<ng-template #noSettings>
			<p class="text-[12px] text-steam-muted">No settings available.</p>
		</ng-template>
	</div>
</article>
