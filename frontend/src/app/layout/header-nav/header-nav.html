<header
    class="bg-[linear-gradient(180deg,#121826_0%,#111826_100%)] border-b border-[rgba(102,192,244,0.12)] flex justify-center w-full h-[68px] shadow-[0_2px_4px_rgba(0,0,0,0.45)] z-10 sticky top-0">
    <div class="flex items-center gap-4 md:gap-7 w-full max-w-[1200px] px-4 md:px-5 h-full">

        <a routerLink="/discover"
            class="hidden md:inline text-2xl font-medium text-[#e5e4dc] tracking-wider uppercase cursor-pointer no-underline">
            Config<span class="brand-accent">Vault</span>
        </a>

        <nav class="flex gap-0 md:gap-1 h-full items-stretch justify-start md:justify-center flex-1">
            <a routerLink="/discover" #discoverRla="routerLinkActive" routerLinkActive="text-white"
                [routerLinkActiveOptions]="{ exact: true }"
                class="h-full w-[112px] inline-flex flex-col items-center justify-center text-steam-muted hover:text-white text-[15px] uppercase font-medium transition-colors no-underline">
                <span class="inline-flex items-center justify-center h-[18px] leading-none">Discover</span>
                <span class="mt-2 h-[2px] w-[104px] bg-[#66c0f4] opacity-0 transition-opacity"
                    [class.opacity-100]="discoverRla.isActive"></span>
            </a>

            <a routerLink="/database" #databaseRla="routerLinkActive" routerLinkActive="text-white"
                [routerLinkActiveOptions]="{ exact: true }"
                class="h-full w-[112px] inline-flex flex-col items-center justify-center text-steam-muted hover:text-white text-[15px] uppercase font-medium transition-colors no-underline">
                <span class="inline-flex items-center justify-center h-[18px] leading-none">Database</span>
                <span class="mt-2 h-[2px] w-[104px] bg-[#66c0f4] opacity-0 transition-opacity"
                    [class.opacity-100]="databaseRla.isActive"></span>
            </a>

            <a routerLink="/community" #communityRla="routerLinkActive" routerLinkActive="text-white"
                [routerLinkActiveOptions]="{ exact: true }"
                class="h-full w-[124px] inline-flex flex-col items-center justify-center text-[#3f5468] hover:text-[#5e7387] text-[15px] uppercase font-medium transition-colors no-underline">
                <span class="relative inline-flex items-center justify-center h-[18px] leading-none w-full">
                    <span>Community</span>
                    <span class="absolute left-[calc(50%+36px)] text-[9px] bg-[#4f6478] text-[#1b2633] px-1 py-[1px] rounded-[2px] leading-none">SOON</span>
                </span>
                <span class="mt-2 h-[2px] w-[104px] bg-[#66c0f4] opacity-0 transition-opacity"
                    [class.opacity-100]="communityRla.isActive"></span>
            </a>
        </nav>

        <div
            class="hidden md:flex relative items-center bg-black/30 border border-[#566d7f] rounded-[3px] px-2 py-1 w-[300px] focus-within:border-[#6e8a9f] transition-all">
            <span class="text-[#5a7387] mr-1">&#9906;</span>
            <input type="text" [(ngModel)]="searchQuery" (ngModelChange)="onSearchInput()"
                placeholder="Search games, engines..."
                class="bg-transparent border-none text-white w-full p-1.5 text-[13px] outline-none placeholder:text-[#5a7387] placeholder:italic" />
        </div>
    </div>
</header>
