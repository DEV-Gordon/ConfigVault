<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConfigVault - Tailwind Version</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            steam: {
              global: '#171a21',
              bg: '#101216',
              accent: '#66c0f4',
              'accent-hover': '#67c1f5',
              border: '#2a475e',
              text: '#c7d5e0',
              muted: '#8f98a0',
              panel: '#1b2838'
            }
          },
          fontFamily: {
            sans: ['"Motiva Sans"', 'Arial', 'Helvetica', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* Estilos mínimos para manejar las etiquetas HTML que vienen de la API de Steam */
    .bb_ul { list-style-type: disc; margin-left: 1.5rem; margin-top: 0.5rem; }
    .bb_ul li { margin-bottom: 0.25rem; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #171a21; }
    ::-webkit-scrollbar-thumb { background: #3a576e; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a6b8a; }
  </style>
</head>
<body class="bg-steam-global text-steam-text font-sans antialiased">

<div class="flex flex-col min-h-screen bg-[radial-gradient(circle_at_top,_#1b2838_0%,_#101216_100%)]">
  
  <header class="bg-steam-global flex justify-center w-full h-[70px] shadow-[0_2px_4px_rgba(0,0,0,0.4)] z-10 sticky top-0">
    <div class="flex items-center gap-7 w-full max-w-[1200px] px-5">
      <div class="text-2xl font-medium text-[#e5e4dc] tracking-wider uppercase cursor-pointer" onclick="showHome()">
        Config<span class="font-light text-steam-accent">Vault</span>
      </div>
      
      <nav class="flex gap-2 h-full items-center justify-center flex-1">
        <button class="active-nav text-white text-[15px] px-3 py-1.5 uppercase font-medium transition-colors" onclick="showHome()">Discover</button>
        <button class="text-steam-muted hover:text-white text-[15px] px-3 py-1.5 uppercase font-medium transition-colors" onclick="showHome()">Database</button>
        <button class="text-[#4a5a6a] cursor-not-allowed text-[15px] px-3 py-1.5 uppercase font-medium flex items-center group">
          Community <span class="text-[10px] bg-[#4a5a6a] text-steam-global px-1 py-0.5 rounded-sm ml-1">SOON</span>
        </button>
      </nav>

      <div class="relative flex items-center bg-black/30 border border-steam-border rounded-[3px] px-2 py-1 w-[300px] focus-within:border-steam-accent focus-within:bg-black/50 transition-all">
        <span class="text-[#5a7387] mr-1">⚲</span>
        <input type="text" id="global-search" placeholder="Search games, engines..." 
               class="bg-transparent border-none text-white w-full p-1 text-[13px] outline-none placeholder:text-[#5a7387] placeholder:italic"
               oninput="handleSearch()">
      </div>
    </div>
  </header>

  <main class="flex flex-1 w-full max-w-[1200px] mx-auto min-h-0">
    <aside class="w-[240px] py-8 px-4 flex flex-col gap-1">
      <h3 class="text-[14px] text-white uppercase mb-3 font-medium">Explore Presets</h3>
      <div class="sidebar-item active bg-steam-accent/20 text-white p-2 rounded-sm cursor-pointer text-[13px] flex items-center gap-2 transition-all">Trending Now</div>
      <div class="sidebar-item hover:bg-steam-accent/10 text-steam-muted hover:text-white p-2 rounded-sm cursor-pointer text-[13px] transition-all">Recently Added</div>
      <div class="sidebar-item hover:bg-steam-accent/10 text-steam-muted hover:text-white p-2 rounded-sm cursor-pointer text-[13px] transition-all">Deck Verified</div>
      
      <h3 class="text-[14px] text-white uppercase mt-6 mb-3 font-medium">Target API</h3>
      <div class="sidebar-item hover:bg-steam-accent/10 text-steam-muted hover:text-white p-2 rounded-sm cursor-pointer text-[13px]">DirectX 12 (DX12)</div>
      <div class="sidebar-item hover:bg-steam-accent/10 text-steam-muted hover:text-white p-2 rounded-sm cursor-pointer text-[13px]">Vulkan (VK)</div>
    </aside>

    <section class="flex-1 overflow-y-auto p-8">
      
      <div id="s-home" class="cv-section block animate-[fadeIn_0.3s_ease]">
        <div id="home-default-view">
          <h2 class="text-xl font-light text-white uppercase tracking-widest mb-5">Trending Configurations</h2>
          <div class="grid grid-cols-[repeat(auto-fill,minmax(220px,1fr))] gap-4 mb-10" id="trending-grid"></div>

          <h2 class="text-xl font-light text-white uppercase tracking-widest mb-5">Recently Added</h2>
          <div class="flex flex-col gap-2" id="recent-list"></div>
        </div>

        <div id="home-search-view" class="hidden">
          <h2 class="text-xl font-light text-white uppercase tracking-widest mb-5">Search Results</h2>
          <div class="flex flex-col gap-2" id="search-results-list"></div>
        </div>
      </div>

      <div id="s-game-detail" class="cv-section hidden animate-[fadeIn_0.3s_ease]">
        <div class="text-[12px] text-steam-muted mb-4 cursor-pointer hover:text-white transition-colors" onclick="showHome()">← Back to Discover</div>
        
        <div class="flex gap-5 items-start mb-5 bg-black/20 p-5 rounded-sm">
          <div id="gd-banner" class="w-[300px] h-[140px] bg-steam-panel rounded-sm flex-shrink-0 shadow-2xl bg-cover bg-center"></div>
          <div class="flex-1">
            <h2 id="gd-title" class="text-[28px] text-white mb-2">Game Title</h2>
            <p id="gd-desc" class="text-[14px] text-steam-muted leading-relaxed"></p>
            <div class="flex gap-2 mt-3 flex-wrap">
              <span id="gd-dev" class="text-[11px] px-2 py-1 rounded-sm border border-white/10"></span>
              <span id="gd-engine" class="text-[11px] px-2 py-1 rounded-sm border border-steam-accent/30 bg-steam-accent/10 text-steam-accent"></span>
              <span id="gd-api" class="text-[11px] px-2 py-1 rounded-sm border border-steam-accent/30 bg-steam-accent/10 text-steam-accent"></span>
            </div>
            <div class="mt-4 flex items-center justify-between">
              <div class="text-[12px]">
                <span class="text-steam-muted">AppID: </span><span id="gd-appid" class="text-white mr-4"></span>
                <span class="text-steam-muted">Released: </span><span id="gd-release" class="text-white"></span>
              </div>
              <button id="gd-store-btn" class="bg-gradient-to-r from-[#47bfff] to-[#1a44c2] text-white px-4 py-2 rounded-sm text-[13px] uppercase font-medium hover:brightness-110 transition-all">
                View on Steam ↗
              </button>
            </div>
          </div>
        </div>

        <div id="gd-reqs-container" class="bg-black/20 border border-steam-border/30 rounded-sm p-5 mb-6 hidden">
          <h3 class="text-[14px] text-white uppercase mb-4 font-medium">System Requirements (PC)</h3>
          <div class="grid grid-cols-2 gap-8">
            <div id="gd-req-min" class="text-[13px] text-steam-muted leading-relaxed"></div>
            <div id="gd-req-rec" class="text-[13px] text-steam-muted leading-relaxed"></div>
          </div>
        </div>
        
        <h2 class="text-[16px] text-white uppercase tracking-widest mb-5">Available Presets</h2>
        <div id="gd-presets-container" class="flex flex-col gap-5"></div>
      </div>

    </section>
  </main>
</div>

<script>
// Mock data aligning with your Django API structure
const API_MOCK_DATA = [
  {
    steam_appid: 1091500,
    engine: { name: "REDengine", version: "4" },
    api_target: "DX12",
    title: "Cyberpunk 2077",
    developer: "CD PROJEKT RED",
    description: "Cyberpunk 2077 is an open-world, action-adventure RPG set in Night City.",
    release_date: "Dec 10, 2020",
    url_header: "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1091500/header.jpg",
    url_capsule: "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1091500/capsule_231x87.jpg",
    requirements: { 
      pc: { 
        minimum: "<strong>Minimum:</strong><ul class='bb_ul'><li>OS: Windows 10</li><li>CPU: Core i7-6700</li><li>RAM: 12 GB</li></ul>", 
        recommended: "<strong>Recommended:</strong><ul class='bb_ul'><li>OS: Windows 10</li><li>CPU: Core i7-12700</li><li>GPU: RTX 2060 SUPER</li></ul>" 
      } 
    },
    presets: [
      {
        tier_label: "Gold",
        deck_verification: "Playable",
        notes: "Optimized for high-end GPUs aiming for 60FPS.",
        settings: [
          { key: "Ray Tracing", value: "Medium", impact: "High" },
          { key: "DLSS", value: "Quality", impact: "Medium" }
        ]
      }
    ]
  },
  {
    steam_appid: 1245620,
    engine: { name: "FromSoftware Engine", version: "" },
    api_target: "DX12",
    title: "Elden Ring",
    developer: "FromSoftware",
    description: "Rise, Tarnished, and be guided by grace to brandish the power of the Elden Ring.",
    release_date: "Feb 24, 2022",
    url_header: "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1245620/header.jpg",
    url_capsule: "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1245620/capsule_231x87.jpg",
    requirements: { pc: { minimum: "<strong>Minimum:</strong><ul class='bb_ul'><li>RAM: 12 GB</li><li>GPU: GTX 1060</li></ul>", recommended: "" } },
    presets: []
  }
];

function init() {
  renderTrending();
  renderRecent();
}

function renderTrending() {
  const grid = document.getElementById('trending-grid');
  API_MOCK_DATA.slice(0, 2).forEach(g => {
    grid.innerHTML += `
      <div class="bg-black/40 shadow-lg rounded-sm overflow-hidden cursor-pointer hover:scale-[1.03] transition-transform" onclick="showDetail(${g.steam_appid})">
        <div class="h-[110px] bg-cover bg-center" style="background-image: url('${g.url_header}')"></div>
        <div class="p-3">
          <div class="text-[14px] text-white truncate font-medium">${g.title}</div>
          <div class="text-[11px] text-steam-muted mt-1">${g.developer}</div>
          <div class="mt-2 text-[11px] text-steam-accent">${g.presets.length} presets available</div>
        </div>
      </div>`;
  });
}

function renderRecent() {
  const list = document.getElementById('recent-list');
  API_MOCK_DATA.forEach(g => {
    list.innerHTML += `
      <div class="flex items-center gap-4 p-3 bg-black/20 border border-steam-border/20 rounded-sm cursor-pointer hover:border-steam-accent/50 hover:bg-steam-panel/40 transition-all" onclick="showDetail(${g.steam_appid})">
        <div class="w-16 h-7 bg-cover bg-center flex-shrink-0" style="background-image: url('${g.url_capsule}')"></div>
        <div class="flex-1">
          <div class="text-[15px] text-white font-medium">${g.title}</div>
          <div class="text-[12px] text-steam-muted">${g.developer} · ${g.engine.name} · ${g.api_target}</div>
        </div>
        <div class="text-[12px] text-steam-accent bg-steam-accent/10 px-2 py-1 rounded-sm">${g.presets.length} Configs</div>
      </div>`;
  });
}

function handleSearch() {
  const query = document.getElementById('global-search').value.toLowerCase();
  const defaultView = document.getElementById('home-default-view');
  const searchView = document.getElementById('home-search-view');
  const resultsList = document.getElementById('search-results-list');
  
  if (!query.trim()) {
    defaultView.classList.remove('hidden');
    searchView.classList.add('hidden');
    return;
  }

  defaultView.classList.add('hidden');
  searchView.classList.remove('hidden');
  resultsList.innerHTML = '';

  const results = API_MOCK_DATA.filter(g => g.title.toLowerCase().includes(query) || g.steam_appid.toString().includes(query));

  if (results.length === 0) {
    resultsList.innerHTML = `<div class="p-10 text-center text-steam-muted bg-black/20 rounded-sm">No games found for "<b>${query}</b>"</div>`;
    return;
  }

  results.forEach(g => {
    resultsList.innerHTML += `<div class="flex items-center gap-4 p-3 bg-black/20 border border-steam-border/20 rounded-sm cursor-pointer hover:border-steam-accent/50" onclick="showDetail(${g.steam_appid})">
        <div class="w-16 h-7 bg-cover bg-center flex-shrink-0" style="background-image: url('${g.url_capsule}')"></div>
        <div class="flex-1 text-white font-medium">${g.title} <span class="text-steam-muted text-[12px] ml-2">(${g.steam_appid})</span></div>
        <div class="text-steam-accent text-[12px]">${g.presets.length} Configs</div>
      </div>`;
  });
}

function showHome() {
  document.getElementById('s-home').classList.remove('hidden');
  document.getElementById('s-game-detail').classList.add('hidden');
}

function showDetail(appId) {
  const game = API_MOCK_DATA.find(g => g.steam_appid === appId);
  if(!game) return;
  
  document.getElementById('gd-title').textContent = game.title;
  document.getElementById('gd-desc').textContent = game.description;
  document.getElementById('gd-dev').textContent = game.developer;
  document.getElementById('gd-engine').textContent = game.engine.name;
  document.getElementById('gd-api').textContent = game.api_target;
  document.getElementById('gd-appid').textContent = game.steam_appid;
  document.getElementById('gd-release').textContent = game.release_date;
  document.getElementById('gd-banner').style.backgroundImage = `url('${game.url_header}')`;
  document.getElementById('gd-store-btn').onclick = () => window.open(`https://store.steampowered.com/app/${game.steam_appid}/`, '_blank');

  const reqContainer = document.getElementById('gd-reqs-container');
  if (game.requirements?.pc?.minimum) {
    document.getElementById('gd-req-min').innerHTML = game.requirements.pc.minimum;
    document.getElementById('gd-req-rec').innerHTML = game.requirements.pc.recommended;
    reqContainer.classList.remove('hidden');
  } else { reqContainer.classList.add('hidden'); }

  const container = document.getElementById('gd-presets-container');
  container.innerHTML = game.presets.length ? '' : '<div class="p-10 text-center text-steam-muted bg-black/20 rounded-sm">No presets available yet.</div>';
  
  game.presets.forEach(p => {
    let rows = p.settings.map(s => `<tr><td class="p-3 border-b border-white/5 text-steam-muted">${s.key}</td><td class="p-3 border-b border-white/5 text-white">${s.value}</td><td class="p-3 border-b border-white/5 font-medium ${s.impact === 'High' ? 'text-orange-400' : 'text-steam-accent'}">${s.impact}</td></tr>`).join('');
    container.innerHTML += `
      <div class="bg-black/30 border border-white/10 rounded-sm overflow-hidden">
        <div class="bg-black/40 p-4 flex justify-between items-center border-b border-steam-border/50">
          <div class="text-white font-medium flex items-center gap-3">Tier: ${p.tier_label} <span class="text-[10px] uppercase px-2 py-0.5 rounded-sm ${p.deck_verification === 'Verified' ? 'bg-green-700 text-green-100' : 'bg-yellow-700 text-yellow-100'}">${p.deck_verification}</span></div>
        </div>
        ${p.notes ? `<div class="p-4 text-[13px] text-steam-muted italic bg-black/10">${p.notes}</div>` : ''}
        <table class="w-full text-left text-[13px]">
          <thead class="bg-black/20 text-steam-muted uppercase text-[11px]"><tr><th class="p-3">Setting</th><th class="p-3">Value</th><th class="p-3">Impact</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  });

  document.getElementById('s-home').classList.add('hidden');
  document.getElementById('s-game-detail').classList.remove('hidden');
}

init();
</script>

<style>
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .active-nav { border-bottom: 3px solid #66c0f4; border-radius: 0; }
</style>
</body>
</html>
